<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">CASP16 protein-ligand benchmark summary</title>
  <desc id="desc">A summary graphic showing strong progress in pose prediction and a remaining bottleneck in affinity scoring.</desc>
  <rect width="1200" height="630" fill="#0f172a"/>
  <rect x="40" y="40" width="1120" height="550" rx="28" fill="#111827" stroke="#334155" stroke-width="2"/>
  <text x="80" y="110" fill="#e5e7eb" font-size="42" font-family="Arial, Helvetica, sans-serif" font-weight="700">CASP16 pharmaceutical protein-ligand benchmark</text>
  <text x="80" y="155" fill="#93c5fd" font-size="24" font-family="Arial, Helvetica, sans-serif">Pose prediction has improved sharply. Affinity scoring is still the bottleneck.</text>

  <rect x="80" y="205" width="310" height="300" rx="20" fill="#1e293b" stroke="#475569"/>
  <text x="110" y="250" fill="#f8fafc" font-size="30" font-family="Arial, Helvetica, sans-serif" font-weight="700">Challenge scale</text>
  <text x="110" y="300" fill="#cbd5e1" font-size="24" font-family="Arial, Helvetica, sans-serif">• 30 research groups</text>
  <text x="110" y="345" fill="#cbd5e1" font-size="24" font-family="Arial, Helvetica, sans-serif">• 229 pose targets</text>
  <text x="110" y="390" fill="#cbd5e1" font-size="24" font-family="Arial, Helvetica, sans-serif">• 140 affinity targets</text>
  <text x="110" y="435" fill="#cbd5e1" font-size="24" font-family="Arial, Helvetica, sans-serif">• 5 protein systems</text>

  <rect x="445" y="205" width="310" height="300" rx="20" fill="#052e2b" stroke="#0f766e"/>
  <text x="475" y="250" fill="#ecfeff" font-size="30" font-family="Arial, Helvetica, sans-serif" font-weight="700">Pose prediction</text>
  <text x="475" y="308" fill="#99f6e4" font-size="54" font-family="Arial, Helvetica, sans-serif" font-weight="700">0.69</text>
  <text x="475" y="345" fill="#ccfbf1" font-size="22" font-family="Arial, Helvetica, sans-serif">Best submitted mean LDDT-PLI</text>
  <text x="475" y="405" fill="#99f6e4" font-size="54" font-family="Arial, Helvetica, sans-serif" font-weight="700">0.80</text>
  <text x="475" y="442" fill="#ccfbf1" font-size="22" font-family="Arial, Helvetica, sans-serif">AlphaFold 3 automated baseline</text>

  <rect x="810" y="205" width="310" height="300" rx="20" fill="#3f1d1d" stroke="#991b1b"/>
  <text x="840" y="250" fill="#fef2f2" font-size="30" font-family="Arial, Helvetica, sans-serif" font-weight="700">Affinity prediction</text>
  <text x="840" y="308" fill="#fca5a5" font-size="54" font-family="Arial, Helvetica, sans-serif" font-weight="700">τ &lt; 0.42</text>
  <text x="840" y="345" fill="#fecaca" font-size="22" font-family="Arial, Helvetica, sans-serif">Best Kendall's tau</text>
  <text x="840" y="405" fill="#fca5a5" font-size="54" font-family="Arial, Helvetica, sans-serif" font-weight="700">~0.73</text>
  <text x="840" y="442" fill="#fecaca" font-size="22" font-family="Arial, Helvetica, sans-serif">Approx. theoretical ceiling</text>

  <text x="80" y="555" fill="#94a3b8" font-size="22" font-family="Arial, Helvetica, sans-serif">Takeaway: structure generation is no longer the only story. Ranking and scoring remain the harder problem.</text>
</svg>
